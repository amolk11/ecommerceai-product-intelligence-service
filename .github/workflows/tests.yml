name: Tests

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  quality:
    name: Ruff and Black
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check app tests

      - name: Black
        run: black --check app tests

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -m unit --cov=app.services --cov-report=term-missing

  contract:
    name: Contract Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run contract tests
        run: pytest -m contract --cov=app.api --cov-report=term-missing

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs:
      - unit
      - contract

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: product_intelligence_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DB_URL: postgresql+psycopg://postgres:postgres@localhost:5432/product_intelligence_test
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests
        run: pytest -m integration --cov=app.repositories --cov=app.api --cov-report=term-missing

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs:
      - unit
      - contract
      - integration

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run coverage
        run: pytest -m "unit or contract" --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: integration
    if: >-
      github.event_name == 'schedule' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/release/')

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: product_intelligence_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DB_URL: postgresql+psycopg://postgres:postgres@localhost:5432/product_intelligence_test
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run e2e tests
        run: pytest -m e2e
