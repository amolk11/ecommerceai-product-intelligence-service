services:

  product-intelligence:
    build: .

    container_name: product-intelligence

    ports:
      - "8000:8000"

    env_file:
      - .env.docker

    depends_on:
      redis:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - product-intelligence-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  redis:
    image: redis:7-alpine

    container_name: product-intelligence-redis

    ports:
      - "6379:6379"

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - product-intelligence-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  prometheus:
    image: prom/prometheus:latest

    container_name: product-intelligence-prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

    restart: unless-stopped

    depends_on:
      - product-intelligence

    networks:
      - product-intelligence-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  grafana:
    image: grafana/grafana:latest

    container_name: product-intelligence-grafana

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning

    restart: unless-stopped

    depends_on:
      - prometheus

    networks:
      - product-intelligence-network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


volumes:
  redis_data:
  prometheus_data:
  grafana_data:


networks:
  product-intelligence-network:
    driver: bridge
    