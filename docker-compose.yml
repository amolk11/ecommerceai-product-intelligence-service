services:
  product-intelligence:
    build: .
    container_name: product-intelligence

    ports:
      - "8000:8000"

    env_file:
      - .env.docker

    depends_on:
      - redis

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: product-intelligence-redis

    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: product-intelligence-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: product-intelligence-grafana

    ports:
      - "3000:3000"

    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards

    depends_on:
      - prometheus

    restart: unless-stopped
    